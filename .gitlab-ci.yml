stages:
  - setup
  - build
  - test
  - deploy

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - when: always

# Verification (tests and code analysis) is unnecessary on 'develop' &
# 'master', because only verified MRs can be merged into those branches.
.verification:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: never
    - if: $CI_COMMIT_BRANCH == "develop"
      when: never
    - when: on_success

default:
  image: node:25-alpine@sha256:bdf2cca6fe3dabd014ea60163eca3f0f7015fbd5c7ee1b0e9ccb4ced6eb02ef4
  cache: # Cache modules in between jobs
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

store_project_version:
  before_script: []
  rules:
    - when: on_success
  cache: []
  stage: setup
  script:
    - echo "PROJECT_VERSION=$(node -p "require('./package.json').version")" >> variables.env
  interruptible: true
  artifacts:
    when: always
    reports:
      dotenv: variables.env

determine-destinations:
  before_script: []
  image:
    name: alpine/git@sha256:8786a6a02273827d0aa039d174aacd5e017fcce9aba0af62596d991970cab01a
    entrypoint: ['']
  stage: setup
  script:
    - |-
      IMAGE_NAME="eu.gcr.io/veo-projekt/veo-web"
      DESTINATION_ARG="--destination $IMAGE_NAME:git-${CI_COMMIT_SHA} --destination $IMAGE_NAME:pipeline-id-${CI_PIPELINE_ID}"
      if echo "$CI_COMMIT_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
        DESTINATION_ARG="$DESTINATION_ARG --destination $IMAGE_NAME:$CI_COMMIT_TAG"
        git fetch --tags
        LATEST_TAG=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
        if [ "$CI_COMMIT_TAG" = "$LATEST_TAG" ]; then
          DESTINATION_ARG="$DESTINATION_ARG --destination $IMAGE_NAME:latest"
        fi
      fi
      if [ "$CI_COMMIT_REF_NAME" = "develop" ]; then
        DESTINATION_ARG="$DESTINATION_ARG --destination $IMAGE_NAME:develop"
      fi

      echo "DESTINATION_ARG=$DESTINATION_ARG" > destinations.env
  artifacts:
    reports:
      dotenv: destinations.env
    expire_in: 1 hour

type_check:
  stage: test
  rules:
    - !reference [.verification, rules]
  needs: []
  script:
    - npm run typecheck
  interruptible: true

check_formatting:
  stage: test
  rules:
    - !reference [.verification, rules]
  needs: []
  script:
    - npm run format:check
    - if [[ ${?} -ne 0 ]]; then echo "Use 'npm run format' to format your code"; exit 1; fi
  interruptible: true

lint:
  stage: test
  rules:
    - !reference [.verification, rules]
  needs: []
  variables:
    DEBUG: 'eslint:cli-engine'
  script:
    - npm run lint
    - if [[ ${?} -ne 0 ]]; then echo "Linting errors were found"; exit 1; fi
  interruptible: true
  allow_failure: false

unit_integration_tests:
  stage: test
  rules:
    - !reference [.verification, rules]
  needs: []
  script:
    - mkdir -p test-results
    - npm test -- --run --reporter=default --reporter=junit --outputFile.junit=test-results/vitest-junit.xml
  artifacts:
    when: always
    paths:
      - ${CI_PROJECT_DIR}/test-results/vitest-junit.xml
    reports:
      junit:
        - test-results/vitest-junit.xml
  interruptible: true

.test_template:
  image: cypress/base:26.0.0@sha256:446be8fcb63e3cad2f9a4e14720e3d8e35993e12f36da541e09f5740a4c2477c
  needs: ['docker_image']
  stage: test
  tags:
    - native
  rules:
    - !reference [.verification, rules]
  variables:
    CYPRESS_parallel_group: 2
    TEST_VEO_DEFAULT_API_URL: $VEO_DEFAULT_API_URL
    TEST_VEO_FORMS_API_URL: $VEO_FORMS_API_URL
    TEST_VEO_HISTORY_API_URL: $VEO_HISTORY_API_URL
    TEST_VEO_REPORTING_API_URL: $VEO_REPORTING_API_URL
    TEST_VEO_ACCOUNTS_API_URL: $VEO_ACCOUNTS_API_URL
    TEST_VEO_ACCOUNT_PATH: $VEO_ACCOUNT_PATH
    TEST_VEO_OIDC_URL: $VEO_OIDC_URL
    TEST_VEO_OIDC_REALM: $VEO_OIDC_REALM
    TEST_VEO_OIDC_CLIENT: $VEO_OIDC_CLIENT
    TEST_VEO_OIDC_ACCOUNT_APPLICATION: $VEO_OIDC_ACCOUNT_APPLICATION
    TEST_VEO_DOCUMENTATION_URL: $VEO_DOCUMENTATION_URL
    TEST_VEO_HIDE_SERNET_REFERENCES: $VEO_HIDE_SERNET_REFERENCES
    TEST_VEO_FEATURE_FLAG_ACCESS_GROUPS: $VEO_FEATURE_FLAG_ACCESS_GROUPS
    TEST_VEO_FEATURE_FLAG_GRAPH: $VEO_FEATURE_FLAG_GRAPH
    TEST_VEO_FEATURE_FLAG_RI_DIALOG_ADDITIONAL_PROPERTIES: $VEO_FEATURE_FLAG_RI_DIALOG_ADDITIONAL_PROPERTIES
    TEST_VEO_FEATURE_FLAG_SHORTCUTS: $VEO_FEATURE_FLAG_SHORTCUTS
    TEST_VEO_FEATURE_FLAG_UNIT_IMPORT: $VEO_FEATURE_FLAG_UNIT_IMPORT
    TEST_VEO_FEATURE_FLAG_USER_SETTINGS: $VEO_FEATURE_FLAG_USER_SETTINGS
  artifacts:
    expire_in: 1 week
    when: always
    paths:
      - ${CI_PROJECT_DIR}/cypress/screenshots
      - ${CI_PROJECT_DIR}/cypress/videos
    reports:
      junit:
        - cypress/results/*.xml
  parallel:
    matrix:
      - CI_NODE_INDEX: [0, 1]
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline
    - chmod +x ./scripts/setup-env.sh ./scripts/run-parallel-tests.sh
    - export CYPRESS_BASE_URL_LOCAL=http://localhost:3000
    - ./scripts/setup-env.sh
    - apt-get update && apt-get install -y curl socat xvfb
    - Xvfb :99 & # Start Xvfb
    - export DISPLAY=:99 # Set the DISPLAY environment variable
    - export {http,https}_proxy="${http_proxy}"
    - export no_proxy="${no_proxy},localhost,127.0.0.1,veo-web"
    - export NO_PROXY="${NO_PROXY},localhost,127.0.0.1,veo-web"
    - socat TCP-LISTEN:3000,fork,reuseaddr TCP:veo-web:5000 &
    - timeout 60 sh -c 'until curl --fail --silent --output /dev/null "$CYPRESS_BASE_URL_LOCAL"; do sleep 1; done'
    - echo "$CYPRESS_BASE_URL_LOCAL is ready"
  interruptible: true
  retry: 2

test:
  extends: .test_template
  services:
    - name: eu.gcr.io/veo-projekt/veo-web:git-${CI_COMMIT_SHA}
      alias: veo-web
      variables:
        VEO_DEFAULT_API_URL: $TEST_VEO_DEFAULT_API_URL
        VEO_FORMS_API_URL: $TEST_VEO_FORMS_API_URL
        VEO_HISTORY_API_URL: $TEST_VEO_HISTORY_API_URL
        VEO_REPORTING_API_URL: $TEST_VEO_REPORTING_API_URL
        VEO_ACCOUNTS_API_URL: $TEST_VEO_ACCOUNTS_API_URL
        VEO_ACCOUNT_PATH: $TEST_VEO_ACCOUNT_PATH
        VEO_OIDC_URL: $TEST_VEO_OIDC_URL
        VEO_OIDC_REALM: $TEST_VEO_OIDC_REALM
        VEO_OIDC_CLIENT: $TEST_VEO_OIDC_CLIENT
        VEO_OIDC_ACCOUNT_APPLICATION: $TEST_VEO_OIDC_ACCOUNT_APPLICATION
        VEO_DOCUMENTATION_URL: $TEST_VEO_DOCUMENTATION_URL
        VEO_HIDE_SERNET_REFERENCES: $TEST_VEO_HIDE_SERNET_REFERENCES
        VEO_FEATURE_FLAG_ACCESS_GROUPS: $TEST_VEO_FEATURE_FLAG_ACCESS_GROUPS
        VEO_FEATURE_FLAG_GRAPH: $TEST_VEO_FEATURE_FLAG_GRAPH
        VEO_FEATURE_FLAG_RI_DIALOG_ADDITIONAL_PROPERTIES: $TEST_VEO_FEATURE_FLAG_RI_DIALOG_ADDITIONAL_PROPERTIES
        VEO_FEATURE_FLAG_SHORTCUTS: $TEST_VEO_FEATURE_FLAG_SHORTCUTS
        VEO_FEATURE_FLAG_UNIT_IMPORT: $TEST_VEO_FEATURE_FLAG_UNIT_IMPORT
        VEO_FEATURE_FLAG_USER_SETTINGS: $TEST_VEO_FEATURE_FLAG_USER_SETTINGS
  script:
    - npm run prepare
    - ./scripts/run-parallel-tests.sh $CI_NODE_INDEX $CYPRESS_parallel_group
    - pkill -f Xvfb # Kill Xvfb after tests

docker_image:
  stage: build
  rules:
    - when: on_success
  needs: ['store_project_version', 'determine-destinations']
  image:
    name: gcr.io/kaniko-project/executor:v1.24.0-debug@sha256:2562c4fe551399514277ffff7dcca9a3b1628c4ea38cb017d7286dc6ea52f4cd
    entrypoint: ['']
  variables:
  # this does not work in Gitlab < 15.7, so we need the before_script workaround
  # GOOGLE_APPLICATION_CREDENTIALS: $GCR_ACCESS_TOKEN
  before_script:
    - export GOOGLE_APPLICATION_CREDENTIALS=${GCR_ACCESS_TOKEN}
  script:
    - |-
      VEO_DEBUG=false
      NODE_ENV=production
      if [ "$CI_COMMIT_REF_NAME" = "develop" ]; then
        export VEO_DEBUG="true"
        export NODE_ENV="development"
      fi
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --cache=true --cache-repo=eu.gcr.io/veo-projekt/kaniko-cache-veo-web --compressed-caching=false $DESTINATION_ARG --build-arg VEO_DEBUG="${VEO_DEBUG}" --build-arg NODE_ENV="${NODE_ENV}" --build-arg CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHORT_SHA} --build-arg CI_JOB_ID=${CI_JOB_ID} --label org.opencontainers.image.version="${PROJECT_VERSION}" --label org.opencontainers.image.revision=${CI_COMMIT_SHA} --build-arg "ftp_proxy=${ftp_proxy}" --build-arg "FTP_PROXY=${ftp_proxy}" --build-arg "http_proxy=${http_proxy}" --build-arg "HTTP_PROXY=${http_proxy}" --build-arg "https_proxy=${https_proxy}" --build-arg "HTTPS_PROXY=${https_proxy}" --build-arg "no_proxy=${no_proxy}" --build-arg "NO_PROXY=${no_proxy}"
  interruptible: true

update-values:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        VALUES_FILE: 'dev-values.yaml'
        IMAGE_TAG: 'git-${CI_COMMIT_SHA}'
    - if: '$CI_COMMIT_TAG'
      variables:
        VALUES_FILE: 'stage-values.yaml'
        IMAGE_TAG: '${CI_COMMIT_TAG}'
    - when: never
  trigger:
    project: veo/verinice-veo-argocd
    branch: main
    strategy: mirror
    inputs:
      valuesFile: $VALUES_FILE
      imageTag: $IMAGE_TAG
      serviceName: 'web'

trigger_deployment:
  stage: deploy
  only:
    - develop
    - tags
  trigger:
    project: veo/verinice-veo-deployment
